name: Native CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  native:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flag: linux
            coverage_file: coverage-linux.xml
          - os: macos-latest
            flag: macos
            coverage_file: coverage-macos.xml
          - os: windows-latest
            flag: windows
            coverage_file: coverage-windows.xml

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit on Unix
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.cn/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Set up MoonBit on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.cn/install/powershell.ps1 | iex
          "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Sync dependencies
        run: moon update

      - name: Run native tests with coverage instrumentation
        run: moon test --target native --enable-coverage

      - name: Generate Cobertura coverage
        run: moon coverage analyze -p justjavac/dialog -- -f cobertura -o "${{ matrix.coverage_file }}"

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          disable_search: true
          files: ${{ matrix.coverage_file }}
          flags: ${{ matrix.flag }}
          name: ${{ matrix.flag }}
